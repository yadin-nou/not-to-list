<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not To Do List</title>
    <!-- Awesome font -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Bootstrap cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .wrapper {
        background: linear-gradient(
          rgba(255, 0, 0, 0.701),
          rgba(128, 0, 128, 0.468)
        );
        min-height: 100vh;
      }
      .table {
        --bs-table-bg: transparent;
      }
    </style>
  </head>
  <body>
    <div class="wrapper pt-5">
      <!-- Title -->
      <div class="container">
        <h1 class="text-center">Not To Do List</h1>

        <!-- Form -->
        <!-- class p-5 is for padding all follow up breakpoint -->
        <!-- class rounded sharp the cornor of border -->
        <!-- shadow is for making shadow -->
        <form
          action="javascript:void(0);"
          class="border p-5 rounded shadow mt-5"
          onsubmit="addTask(this)"
        >
          <!-- g-2 is a gab bewteen column when this become responsive -->
          <div class="row g-2">
            <!-- add md between col and 7 is to make it repsonesive to the breakpoint in the list -->
            <div class="col-md-7">
              <input
                type="text"
                class="form-control"
                placeholder="task"
                aria-label="task"
                name="task"
                required
              />
            </div>
            <div class="col-md-2">
              <input
                type="number"
                class="form-control"
                placeholder="40"
                aria-label="hour"
                name="hour"
                min="1"
                required
              />
            </div>
            <!-- d-grid mean: to tell the parent that is will expand to fill the rest blank space -->
            <div class="col-md-3 d-grid">
              <!-- //use type='button' make the form not refresh -->
              <button class="btn btn-primary">Add New Task</button>
            </div>
          </div>
        </form>

        <!-- Tables  -->
        <div class="row mt-5">
          <!-- md make it responsive -->
          <div class="col-md">
            <h3 class="text-center">Entry List</h3>
            <hr />

            <table class="table table-striped table-hover border">
              <tbody id="entryList"></tbody>
            </table>
            <div class="alert alert-success">
              The total hours allocated =
              <span id="entryHour" class="text-primary"> 0 </span> hr
            </div>
          </div>

          <div class="col-md">
            <h3 class="text-center">Bad List</h3>
            <hr />

            <table class="table table-striped table-hover border" id="badList">
              <tbody></tbody>
            </table>
            <div class="alert alert-success">
              You could have saved =
              <span id="badHour" class="text-primary">0</span> hr
            </div>
          </div>
        </div>
        <!-- Entry list -->
        <!-- Bad list table -->
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
